<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;
  --surface:#12121a;
  --card:#1a1a24;
  --border:#2a2a3a;
  --text:#e8e8f0;
  --muted:#888899;
  --accent:#6366f1;
  --accent-light:#818cf8;
  --success:#10b981;
  --radius:16px;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);line-height:1.7}
a{color:inherit;text-decoration:none}
img{max-width:100%;display:block}

.site-header{position:sticky;top:0;z-index:100;background:rgba(10,10,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{max-width:1400px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.3rem;font-weight:700}.logo span{color:var(--accent)}
.back-link{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:.9rem;transition:.3s}
.back-link:hover{color:var(--accent)}

.detail-container{max-width:1200px;margin:0 auto;padding:48px 32px}

.template-header{display:grid;grid-template-columns:1.2fr 1fr;gap:48px;margin-bottom:48px;align-items:start}
@media(max-width:900px){.template-header{grid-template-columns:1fr}}
.preview-frame{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative}
.preview-frame iframe{width:100%;height:500px;border:none}
.preview-actions{position:absolute;top:12px;right:12px;display:flex;gap:8px}
.preview-actions a{padding:8px 16px;background:rgba(0,0,0,.7);border-radius:8px;font-size:.8rem;color:#fff;transition:.3s}
.preview-actions a:hover{background:var(--accent)}
.download-prompt-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;border-radius:12px;font-size:.9rem;font-weight:600;transition:all .3s;margin-top:16px;width:100%;justify-content:center}
.download-prompt-btn:hover{opacity:.85;transform:translateY(-2px);box-shadow:0 8px 24px rgba(99,102,241,.4)}

.template-info h1{font-size:2rem;font-weight:700;margin-bottom:8px}
.template-meta{display:flex;gap:16px;margin-bottom:20px;font-size:.9rem;color:var(--muted)}
.template-desc{color:var(--muted);margin-bottom:24px;line-height:1.9}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
.info-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.info-item label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.info-item span{font-weight:500}
.color-swatches{display:flex;gap:8px;margin-top:8px}
.swatch{width:24px;height:24px;border-radius:6px;border:1px solid var(--border)}
.tags-list{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:6px 14px;background:var(--surface);border:1px solid var(--border);border-radius:99px;font-size:.8rem}

.pages-section{margin-top:48px}
.pages-section h2{font-size:1.4rem;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.page-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .3s}
.page-card:hover{border-color:var(--accent);transform:translateY(-4px)}
.page-thumb{height:160px;background:var(--surface);overflow:hidden}
.page-thumb iframe{width:200%;height:200%;transform:scale(.5);transform-origin:top left;pointer-events:none}
.page-info{padding:16px;display:flex;justify-content:space-between;align-items:center}
.page-info h4{font-size:.95rem;font-weight:500}
.page-info .view-btn{padding:6px 14px;background:var(--accent);color:#fff;border-radius:8px;font-size:.78rem}

.site-footer{border-top:1px solid var(--border);padding:32px;text-align:center;color:var(--muted);font-size:.85rem;margin-top:60px}

@media(max-width:768px){
  .detail-container{padding:24px 16px}
  .info-grid{grid-template-columns:1fr}
  .pages-grid{grid-template-columns:1fr}
}
</style>

function loadTemplate() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || 'template-001-aurora-beauty';
  const template = templates[id];
  
  if (!template) {
    document.querySelector('.detail-container').innerHTML = '<p style="text-align:center;padding:100px">模板不存在</p>';
    return;
  }

  const basePath = `templates/${id}/`;

  document.title = `${template.name} — 全職設計視角`;
  document.getElementById('templateName').textContent = template.name;
  document.getElementById('templateIndustry').textContent = template.industry;
  document.getElementById('templatePages').textContent = `${template.pages.length} 頁`;
  document.getElementById('templateTheme').textContent = template.theme;
  document.getElementById('templateDesc').textContent = template.description;
  document.getElementById('templateLayout').textContent = template.layout;
  document.getElementById('templateMenu').textContent = template.menu;
  document.getElementById('templateFonts').textContent = template.fonts;
  document.getElementById('pageCount').textContent = template.pages.length;

  // Colors
  const swatches = document.getElementById('colorSwatches');
  swatches.innerHTML = template.colors.map(c => `<div class="swatch" style="background:${c}" title="${c}"></div>`).join('');

  // Tags
  const tagsList = document.getElementById('tagsList');
  tagsList.innerHTML = template.tags.map(t => `<span class="tag">${t}</span>`).join('');

  // Preview iframe
  const previewFrame = document.getElementById('previewFrame');
  const firstPage = basePath + template.pages[0].file;
  previewFrame.src = firstPage;
  document.getElementById('newTabLink').href = firstPage;

  // Download prompt button
  const promptBtn = document.getElementById('downloadPromptBtn');
  promptBtn.href = basePath + 'prompt.md';

  // Pages grid
  const pagesGrid = document.getElementById('pagesGrid');
  pagesGrid.innerHTML = template.pages.map(page => `
    <a href="${basePath + page.file}" target="_blank" class="page-card">
      <div class="page-thumb">
        <iframe src="${basePath + page.file}" loading="lazy"></iframe>
      </div>
      <div class="page-info">
        <h4>${page.name}</h4>
        <span class="view-btn">開啟</span>
      </div>
    </a>
  `).join('');
}

loadTemplate();
</script>
</body>
</html>
