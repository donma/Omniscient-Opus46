.mobile-menu{position:fixed;top:0;left:-100%;width:280px;height:100vh;background:var(--surface);z-index:2000;padding:80px 30px;transition:left .3s;display:flex;flex-direction:column;gap:20px}.mobile-menu.active{left:0}.mobile-menu a{color:var(--text);font-size:1.1rem;display:block;padding:10px 0;border-bottom:1px solid var(--border)}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1500}.overlay.active{display:block}
.close-menu{position:absolute;top:20px;right:20px;font-size:1.5rem;color:var(--text);cursor:pointer;background:none;border:none}
@media(max-width:768px){.nav-links{display:none}.hamburger{display:flex}}

.page-hero{padding:160px 0 80px;text-align:center;background:var(--surface)}

.page-hero h1 span{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.page-hero p{color:var(--muted);margin-top:12px}

section{padding:80px 0}
.gallery-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:250px;gap:12px}
.gallery-grid .item{overflow:hidden;border-radius:var(--radius);position:relative}
.gallery-grid .item img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.gallery-grid .item:hover img{transform:scale(1.08)}
.gallery-grid .item.wide{grid-column:span 2}
.gallery-grid .item.tall{grid-row:span 2}
@media(max-width:768px){.gallery-grid{grid-template-columns:repeat(2,1fr);grid-auto-rows:200px}.gallery-grid .item.wide,.gallery-grid .item.tall{grid-column:span 1;grid-row:span 1}}

footer{background:var(--surface);border-top:1px solid var(--border);padding:60px 0 30px}

.footer-col h4{font-family:var(--font-title);font-size:1.1rem;margin-bottom:16px;color:var(--fire)}
.footer-col p,.footer-col a{color:var(--muted);font-size:.9rem;display:block;margin-bottom:8px}
