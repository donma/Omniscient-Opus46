<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#faf7f2;--white:#ffffff;--wood:#8b5e3c;--wood-dark:#6b3f1f;--cream:#f5ece0;--text:#2c231c;--muted:#7a6b5a;--border:#e8ddd0;--green:#7a9a6a;--radius:12px}
body{font-family:'Noto Sans TC',sans-serif;font-weight:300;color:var(--text);background:var(--bg);line-height:1.8}
h1,h2,h3,h4{font-family:'Libre Baskerville',serif;font-weight:700;line-height:1.4}
a{color:var(--wood);text-decoration:none}
img{max-width:100%;height:auto;display:block}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
nav{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
nav .nav-inner{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;max-width:1200px;margin:0 auto}
nav .logo{font-family:'Libre Baskerville',serif;font-size:1.3rem;color:var(--wood-dark);font-weight:700}
nav .logo span{font-size:.85rem;color:var(--muted);margin-left:8px;font-family:'Noto Sans TC',sans-serif;font-weight:300}
nav ul{display:flex;gap:24px;list-style:none}
nav ul a{color:var(--text);font-size:.9rem;transition:color .3s}
nav ul a:hover{color:var(--wood)}
.menu-btn{display:none;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--text)}
@media(max-width:768px){nav ul{display:none;position:absolute;top:100%;right:0;background:var(--white);flex-direction:column;padding:24px;gap:16px;border:1px solid var(--border);border-radius:0 0 0 var(--radius);min-width:200px}nav ul.open{display:flex}.menu-btn{display:block}}
section{padding:80px 0}
.page-header{background:var(--cream);padding:60px 0;text-align:center}
.page-header h1{font-size:2.2rem;color:var(--wood-dark);margin-bottom:8px}
.page-header p{color:var(--muted)}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.gallery img{width:100%;height:280px;object-fit:cover;border-radius:var(--radius);cursor:pointer;transition:transform .3s}
.gallery img:hover{transform:scale(1.02)}
@media(max-width:768px){.gallery{grid-template-columns:repeat(2,1fr)}.gallery img{height:180px}}
footer{background:var(--wood-dark);color:var(--cream);padding:48px 0 24px}
footer .footer-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-bottom:32px}
footer h4{font-family:'Libre Baskerville',serif;margin-bottom:16px;font-size:1rem}
footer p,footer a{color:rgba(245,236,224,.8);font-size:.85rem}
footer .copy{text-align:center;padding-top:24px;border-top:1px solid rgba(245,236,224,.2);font-size:.8rem;color:rgba(245,236,224,.5)}
@media(max-width:768px){footer .footer-grid{grid-template-columns:1fr}}
</style>
</head>
